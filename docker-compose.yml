services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pokemon
      POSTGRES_PASSWORD: pokemon
      POSTGRES_DB: pokemon
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pokemon"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://pokemon:pokemon@db:5432/pokemon
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  storybook:
    build:
      context: .
      target: storybook
    ports:
      - "6006:80"

volumes:
  postgres_data:
